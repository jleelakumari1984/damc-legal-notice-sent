<div class="modal fade" id="switchSessionModal" tabindex="-1" aria-labelledby="switchSessionModalLabel"
  aria-hidden="true" (shown.bs.modal)="refresh()">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="switchSessionModalLabel">
          <i class="fa fa-exchange-alt me-2"></i>Switch Session
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible mb-3">
          {{ errorMessage }}
          <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
        </div>

        <!-- Currently in switched session -->
        <ng-container *ngIf="isInSwitchedSession; else switchForm">
          <div class="alert alert-warning">
            <i class="fa fa-info-circle me-1"></i>
            You are currently viewing as <strong>{{ currentUser?.displayName }}</strong>
            ({{ currentUser?.loginName }}).
          </div>
          <p class="text-muted mb-0">
            Original admin: <strong>{{ originalUser?.displayName }}</strong>
          </p>
        </ng-container>

        <!-- Switch to user form -->
        <ng-template #switchForm>
          <p class="text-muted mb-3">Select a user to temporarily view the system as that user.</p>

          <div *ngIf="loading" class="text-center py-3">
            <span class="spinner-border spinner-border-sm me-2"></span> Loading users...
          </div>

          <div *ngIf="!loading">
            <label class="form-label">Select User <span class="text-danger">*</span></label>
            <select class="form-select" [(ngModel)]="selectedUserId">
              <option [ngValue]="null" disabled>— Choose a user —</option>
              <option *ngFor="let u of users" [ngValue]="u.id">
                {{ u.displayName }} ({{ u.loginName }})
              </option>
            </select>
          </div>
        </ng-template>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>

        <ng-container *ngIf="isInSwitchedSession; else switchBtn">
          <button type="button" class="btn btn-primary" (click)="switchBack()">
            <i class="fa fa-undo me-1"></i> Switch Back to Admin
          </button>
        </ng-container>

        <ng-template #switchBtn>
          <button type="button" class="btn btn-brand" [disabled]="switching || !selectedUserId" (click)="switchTo()">
            <span *ngIf="switching" class="spinner-border spinner-border-sm me-1"></span>
            <i *ngIf="!switching" class="fa fa-exchange-alt me-1"></i>
            Switch
          </button>
        </ng-template>
      </div>
    </div>
  </div>
</div>
