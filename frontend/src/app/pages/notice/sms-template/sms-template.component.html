<div class="py-4" [class.d-none]="showApproval">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="brand-title mb-0">SMS Templates of <span class="fw-bold text-danger">{{ selectedNotice?.name }}</span>
    </h3>
    <div class="d-flex gap-2">
      <div>
        <span class="text-muted">Status:</span>
        <select class="form-select form-select-sm d-inline-block w-auto ms-1" [(ngModel)]="isActiveStatus"
          (change)="statusChanged();">
          <option [value]="true">Active</option>
          <option [value]="false">Inactive</option>
        </select>

      </div>
      <button class="btn btn-brand btn-sm" (click)="openAddForm()" *ngIf="selectedNotice">
        + Add Template
      </button>
      <button class="btn btn-secondary btn-sm" (click)="onClose.emit(changeTemplate)">Close</button>
    </div>
  </div>

  <div class="card page-card p-4 mb-4">
    <div class="mb-2" *ngIf="selectedNotice">
      <span class="text-muted">Notice Type:</span>
      <span class="fw-semibold ms-1">{{ selectedNotice.name }}</span>
    </div>

    <div *ngIf="successMessage" class="alert alert-success alert-dismissible mb-3">
      {{ successMessage }}
      <button type="button" class="btn-close" (click)="successMessage = ''"></button>
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible mb-3">
      {{ errorMessage }}
      <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
    </div>

    <div class="table-responsive">
      <table id="smsTemplatesTable" class="table table-sm table-bordered align-middle mb-0 w-100"></table>
    </div>
  </div>
</div>
<app-sms-approval-form *ngIf="isSuperAdmin" [inline]="showApproval" (done)="onApproved()"
  (cancelled)="onApprovalCancelled()"></app-sms-approval-form>

<app-sms-template-form-user [editTemplate]="editTemplate" [noticeType]="selectedNotice"
  (saved)="onSaved($event)"></app-sms-template-form-user>

<app-sms-template-view></app-sms-template-view>
