<!-- SMS Template Modal -->
<div class="modal fade" id="smsTemplateModal" tabindex="-1" aria-labelledby="smsTemplateModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="modal-header">
          <h5 class="modal-title" id="smsTemplateModalLabel">
            {{ editTemplate ? 'Edit' : 'Add' }} SMS Template
          </h5>
          <button type="button" class="btn-close" (click)="cancel()"></button>
        </div>

        <div class="modal-body">
          <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible mb-3">
            {{ errorMessage }}
            <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
          </div>

          <div class="row g-3">
           

            <div class="col-md-4">
              <label class="form-label">Sender ID <span class="text-danger">*</span></label>
              <input type="text" class="form-control" formControlName="senderId"
                [class.is-invalid]="form.get('senderId')?.invalid && form.get('senderId')?.touched">
              <div class="invalid-feedback">Required.</div>
            </div>

            <div class="col-md-4">
              <label class="form-label">Template ID <span class="text-danger">*</span></label>
              <input type="text" class="form-control" formControlName="templateId"
                [class.is-invalid]="form.get('templateId')?.invalid && form.get('templateId')?.touched">
              <div class="invalid-feedback">Required.</div>
            </div>

            <div class="col-md-4">
              <label class="form-label">PEID</label>
              <input type="text" class="form-control" formControlName="peid">
            </div>

            <div class="col-md-4">
              <label class="form-label">Route ID</label>
              <input type="text" class="form-control" formControlName="routeId">
            </div>

            <div class="col-md-4">
              <label class="form-label">Channel</label>
              <input type="text" class="form-control" formControlName="channel">
            </div>

            <div class="col-md-3">
              <label class="form-label">DCS</label>
              <input type="number" class="form-control" formControlName="dcs">
            </div>

            <div class="col-md-3">
              <label class="form-label">Flash SMS</label>
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" formControlName="flashSms" id="flashSmsCheck">
                <label class="form-check-label" for="flashSmsCheck">Enable Flash</label>
              </div>
            </div>

            <div class="col-md-3">
              <label class="form-label">Status</label>
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" formControlName="status" id="statusCheck">
                <label class="form-check-label" for="statusCheck">Active</label>
              </div>
            </div>

            <div class="col-12">
              <label class="form-label">Template Text <span class="text-danger">*</span></label>
              <textarea class="form-control" formControlName="templateText" rows="4"
                [class.is-invalid]="form.get('templateText')?.invalid && form.get('templateText')?.touched">
              </textarea>
              <div class="invalid-feedback">Required.</div>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
          <button type="submit" class="btn btn-brand" [disabled]="saving || form.invalid">
            <span *ngIf="saving" class="spinner-border spinner-border-sm me-1"></span>
            {{ editTemplate ? 'Update' : 'Save' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
