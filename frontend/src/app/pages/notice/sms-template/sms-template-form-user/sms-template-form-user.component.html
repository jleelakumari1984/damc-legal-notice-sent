<!-- SMS User Template Modal -->
<div class="modal fade" id="smsUserTemplateModal" tabindex="-1"
  aria-labelledby="smsUserTemplateModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="modal-header">
          <h5 class="modal-title" id="smsUserTemplateModalLabel">
            {{ editTemplate ? 'Edit' : 'Add' }} SMS Template
          </h5>
          <button type="button" class="btn-close" (click)="cancel()"></button>
        </div>

        <div class="modal-body">
          <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible mb-3">
            {{ errorMessage }}
            <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
          </div>

          <div *ngIf="submittedForApproval" class="alert alert-info mb-3">
            <i class="fa fa-info-circle me-1"></i>
            Template submitted for approval. It will be activated once reviewed by an admin.
          </div>

          <div *ngIf="isApproved" class="alert alert-success mb-3">
            <i class="fa fa-check-circle me-1"></i>
            This template has been <strong>approved</strong> and cannot be edited.
          </div>

          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Template Content <span class="text-danger">*</span></label>

              <div *ngIf="excelFields.length > 0 && !isApproved" class="mb-2">
                <small class="text-muted d-block mb-1">Click a field to insert into template:</small>
                <span *ngFor="let f of excelFields"
                  class="badge bg-secondary me-1 mb-1 cursor-pointer"
                  style="cursor:pointer"
                  (click)="insertField(f.excelFieldName)"
                  title="Insert {{'{{'}}{{f.excelFieldName}}{{'}}'}}">
                  {{ f.excelFieldName }}
                </span>
              </div>

              <textarea #contentArea class="form-control" formControlName="userTemplateContent" rows="5"
                [attr.readonly]="isApproved ? true : null"
                [class.is-invalid]="form.get('userTemplateContent')?.invalid && form.get('userTemplateContent')?.touched">
              </textarea>
              <div class="invalid-feedback">Required.</div>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
          <button *ngIf="!isApproved" type="submit" class="btn btn-brand" [disabled]="saving || form.invalid">
            <span *ngIf="saving" class="spinner-border spinner-border-sm me-1"></span>
            {{ editTemplate ? 'Update' : 'Save' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
