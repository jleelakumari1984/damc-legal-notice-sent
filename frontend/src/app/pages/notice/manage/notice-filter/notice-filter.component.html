<div class="modal fade" id="noticeFilterModal" tabindex="-1" aria-labelledby="noticeFilterModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="noticeFilterModalLabel">
          <i class="fa fa-filter me-2"></i>Filter Notices
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">

          <!-- Notice Name -->
          <div class="col-12">
            <label class="form-label" for="nf-noticeName">Notice Name</label>
            <input id="nf-noticeName" class="form-control" [(ngModel)]="noticeName"
              placeholder="Search by notice name..." (keyup.enter)="apply()">
          </div>

          <!-- Status – select2 -->
          <div class="col-12">
            <label class="form-label" for="nf-status">Status</label>
            <select id="nf-status" class="form-select">
              <option value="">All statuses</option>
              <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
            </select>
          </div>

          <!-- User – select2 -->
          <div class="col-12">
            <label class="form-label" for="nf-userId">User</label>
            <select id="nf-userId" class="form-select">
              <option value="">All users</option>
              <option *ngFor="let u of users" [value]="u.id">{{ u.displayName }}</option>
            </select>
          </div>

          <!-- From Date – flatpickr datetime -->
          <div class="col-md-6">
            <label class="form-label" for="nf-fromDate">From Date &amp; Time</label>
            <input id="nf-fromDate" type="text" class="form-control"
              placeholder="YYYY-MM-DD HH:MM" autocomplete="off">
          </div>

          <!-- To Date – flatpickr datetime -->
          <div class="col-md-6">
            <label class="form-label" for="nf-toDate">To Date &amp; Time</label>
            <input id="nf-toDate" type="text" class="form-control"
              placeholder="YYYY-MM-DD HH:MM" autocomplete="off">
          </div>

        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" (click)="reset()">
          <i class="fa fa-times me-1"></i>Reset
        </button>
        <button type="button" class="btn btn-brand" (click)="apply()">
          <i class="fa fa-search me-1"></i>Apply
        </button>
      </div>
    </div>
  </div>
</div>
