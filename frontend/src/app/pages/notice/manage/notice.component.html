<div class="container py-4" [class.d-none]="actionType!='display'">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="brand-title mb-0">Notice(s)</h3>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm" (click)="reload()">Refresh</button>
      <button class="btn btn-brand btn-sm" (click)="openAddModal()">+ Add Notice</button>
    </div>
  </div>

  <div *ngIf="successMessage" class="alert alert-success alert-dismissible mb-3">
    {{ successMessage }}
    <button type="button" class="btn-close" (click)="successMessage = ''"></button>
  </div>
  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible mb-3">
    {{ errorMessage }}
    <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
  </div>

  <div class="card page-card p-4">
    <div class="table-responsive">
      <table id="noticesTable" class="table table-striped table-sm align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Notice Name</th>
            <th>Created At</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>


<app-notice-form *ngIf="actionType === 'edit'" [editNotice]="editNotice" (saved)="onSaved()"></app-notice-form>

<app-notice-excel-mappings *ngIf="actionType === 'excel'" [selectedNotice]="editNotice" [selectFrom]="'notice'"
  (onClose)="closeNoticeMapping()"></app-notice-excel-mappings>

<app-sms-template *ngIf="actionType === 'sms'" [selectedNotice]="editNotice"
  (onClose)="closeSmsTemplate($event)"></app-sms-template>

<app-whatsapp-template *ngIf="actionType === 'whatsapp'" [selectedNotice]="editNotice"
  (onClose)="closeWhatsappTemplate($event)"></app-whatsapp-template>
