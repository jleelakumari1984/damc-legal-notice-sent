<div class="modal fade" id="noticeModal" tabindex="-1" aria-labelledby="noticeModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="noticeModalLabel">{{ isEditing ? 'Edit Notice' : 'Add Notice' }}</h5>
        <button type="button" class="btn-close" (click)="cancel()"></button>
      </div>
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" formControlName="title" placeholder="Notice name"
                [class.is-invalid]="form.get('title')!.invalid && form.get('title')!.touched" />
              <div class="invalid-feedback">Name is required.</div>
            </div>
            
            <div class="col-12">
              <label class="form-label">Description <span class="text-danger">*</span></label>
              <textarea class="form-control" formControlName="description" placeholder="Notice description"
                [class.is-invalid]="form.get('description')!.invalid && form.get('description')!.touched"></textarea>
              <div class="invalid-feedback">Description is required.</div>
            </div>
            <div *ngIf="errorMessage" class="col-12">
              <div class="alert alert-danger mb-0">{{ errorMessage }}</div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
          <button type="submit" class="btn btn-brand px-4" [disabled]="saving || form.invalid">
            {{ saving ? 'Saving...' : (isEditing ? 'Update' : 'Create') }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
