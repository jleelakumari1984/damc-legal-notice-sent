<div *ngIf="errorMessage" class="alert alert-danger alert-dismissible mb-3">
  {{ errorMessage }}
  <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
</div>
<div *ngIf="successMessage" class="alert alert-success alert-dismissible mb-3">
  {{ successMessage }}
  <button type="button" class="btn-close" (click)="successMessage = ''"></button>
</div>

<div class="card page-card p-4 mb-4">
  <div class="table-responsive">
    <table id="mappingsTable" class="table table-striped table-sm align-middle">
      <thead class="table-light">
        <tr>
          <th>#</th>
          <th>Excel Field Name</th>
          <th>DB Field Name</th>
          <th>Key</th>
          <th>Mobile</th>
          <th>Mandatory</th>
          <th>Attachment</th>
          <th>Created At</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
<app-notice-excel-mapping-form [noticeType]="selectedNotice"
  (saved)="onSaved()"></app-notice-excel-mapping-form>
