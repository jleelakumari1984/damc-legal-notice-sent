<div class="py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="brand-title mb-0">Send Legal Notices</h3>
  </div>

  <div class="card page-card p-4 mb-4">
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Notice Type</label>
          <select class="form-select" formControlName="noticeSno" (change)="onNoticeTypeChange($event)">
            <option value="">Select Notice Type</option>
            <option *ngFor="let type of noticeTypes" [value]="type.id"
              [disabled]="type.smsMapCount == 0 && type.whatsappMapCount == 0 && type.mailMapCount == 0 && type.excelMapCount == 0">
              {{ type.name }}</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">Upload ZIP (Excel + PDFs)</label>
          <input type="file" class="form-control" accept=".zip,.xlsx,.xls" (change)="onFileChange($event)"
            [disabled]="!selectedNoticeType" />
        </div>



        <div class="col-md-6 d-flex align-items-center gap-4 pt-2">
          <div class="form-check" *ngIf="!selectedNoticeType || selectedNoticeType.smsMapCount > 0">
            <input class="form-check-input" type="checkbox" id="sms" formControlName="sendSms" />
            <label class="form-check-label" for="sms">Send SMS</label>
          </div>
          <div class="form-check" *ngIf="!selectedNoticeType || selectedNoticeType.whatsappMapCount > 0">
            <input class="form-check-input" type="checkbox" id="whatsapp" formControlName="sendWhatsapp" />
            <label class="form-check-label" for="whatsapp">Send WhatsApp</label>
          </div>
        </div>

        <div class="col-md-6 text-md-end">
          <button type="submit" class="btn btn-brand px-4" [disabled]="loading">
            {{ loading ? 'Uploading...' : 'Upload' }}
          </button>
        </div>
      </div>
    </form>

    <div *ngIf="successMessage" class="alert alert-success mt-3 mb-0">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="alert alert-danger mt-3 mb-0">{{ errorMessage }}</div>
  </div>

  <!-- Excel Preview -->
  <div class="card page-card p-4 mb-4" *ngIf="previewLoading || preview">
    <h5 class="mb-3">Excel Preview</h5>
    <div *ngIf="previewLoading" class="text-muted">Loading preview...</div>
    <div *ngIf="preview && !previewLoading" class="table-responsive">
      <table id="previewDataTable" class="table table-bordered table-sm align-middle">
        <thead class="table-light">
          <tr>
            <th></th>
            <th *ngFor="let col of preview.columnNames">{{ col }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of preview.rows" [class.table-primary]="selectedPreviewRow === row">
            <td>
              <input type="radio" name="previewRowSelect" (change)="selectedPreviewRow = row"
                [checked]="selectedPreviewRow === row" />
            </td>
            <td *ngFor="let col of preview.columnNames">{{ row.data[col] }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="preview && !previewLoading" class="mt-3 d-flex align-items-start gap-3 flex-wrap">
      <div class="d-flex align-items-center gap-2">
        <label class="form-label mb-0">Mobile Number</label>
        <input type="text" class="form-control form-control-sm" style="width:180px" [(ngModel)]="sampleMobile"
          placeholder="e.g. 9876543210" [disabled]="!selectedPreviewRow" />
      </div>
      <div class="form-check align-self-center">
        <input class="form-check-input" type="checkbox" id="sampleSms" [(ngModel)]="sampleSendSms" />
        <label class="form-check-label" for="sampleSms">SMS</label>
      </div>
      <div class="form-check align-self-center">
        <input class="form-check-input" type="checkbox" id="sampleWhatsapp" [(ngModel)]="sampleSendWhatsapp" />
        <label class="form-check-label" for="sampleWhatsapp">WhatsApp</label>
      </div>
      <button class="btn btn-brand px-2 btn-sm" (click)="sendSample()"
        [disabled]="sampleLoading || !selectedPreviewRow">
        {{ sampleLoading ? 'Sending...' : 'Send Sample' }}
      </button>
      <div *ngIf="sampleSuccess" class="text-success small align-self-center">{{ sampleSuccess }}</div>
      <div *ngIf="sampleError" class="text-danger small align-self-center">{{ sampleError }}</div>
    </div>
  </div>

  <div class="card page-card p-4" *ngIf="rows.length">
    <h5 class="mb-3">Excel Validation Result</h5>
    <div class="table-responsive">
      <table id="validationTable" class="table table-striped align-middle">
        <thead>
          <tr>
            <th>Agreement No</th>
            <th *ngFor="let col of validationColumns">{{ col }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of rows">
            <td>{{ row.agreementNumber }}</td>
            <td *ngFor="let col of validationColumns">{{ parseExcelData(row.excelData)[col] }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
