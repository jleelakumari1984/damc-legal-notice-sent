<div class="px-4 py-4" [class.d-none]="actionType!='display'">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="brand-title mb-0">Scheduled Notices</h3>
        <button class="btn btn-outline-secondary btn-sm" (click)="reload()">Refresh</button>
    </div>

    <!-- Notices List -->
    <div class="card page-card p-4 mb-4">
        <div *ngIf="errorMessage" class="alert alert-danger mb-3">{{ errorMessage }}</div>

        <div class="table-responsive">
            <table id="noticesTable" class="table table-striped table-sm align-middle">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>File Name</th>
                        <th>Process ID</th>
                        <th>SMS</th>
                        <th>WhatsApp</th>
                        <th>Status</th>
                        <th>Created At</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>


</div>
<div class="px-4 py-4" *ngIf="actionType === 'detail' && ( selectedReport)">
    <!-- Notice Detail -->
    <app-notice-detail [selectedReport]="selectedReport" [reportStatus]="reportStatus" (onClose)="showDisplayDetail()">
    </app-notice-detail>
</div>

<div class="px-4 py-4" *ngIf="actionType === 'sms' && ( selectedReport )">
    <!-- SMS Logs -->
    <app-sms-logs [selectedReport]="selectedReport" [reportStatus]="reportStatus" (onClose)="showDisplayDetail()">
    </app-sms-logs>
</div>

<div class="px-4 py-4" *ngIf="actionType === 'whatsapp' && ( selectedReport )">
    <!-- WhatsApp Logs -->
    <app-whatsapp-logs [selectedReport]="selectedReport" [reportStatus]="reportStatus" (onClose)="showDisplayDetail()">
    </app-whatsapp-logs>
</div>
