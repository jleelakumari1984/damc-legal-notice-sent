<div *ngIf="!smsLogs.length" class="text-muted">
    No SMS logs found for this item.
</div>
<div class="table-responsive" *ngIf="smsLogs.length">
    <table class="table table-sm table-bordered align-middle mb-0">
        <thead class="table-light">
            <tr>
                <th>#</th>
                <th>Mobile Number</th>
                <th>Message</th>
                <th>Status</th>
                <th>Sent At</th>
                <th>Error</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let log of smsLogs; let i = index">
                <td>{{ i + 1 }}</td>
                <td>{{ log.mobileNumber }}</td>
                <td class="text-break" style="max-width: 300px;">{{ log.message }}</td>
                <td>
                    <span class="badge" [ngClass]="statusBadge(log.status)">{{ log.status }}</span>
                </td>
                <td>{{ log.sentAt | date:'dd MMM yyyy, hh:mm a' }}</td>
                <td class="text-danger">{{ log.errorMessage }}</td>
            </tr>
        </tbody>
    </table>
</div>
