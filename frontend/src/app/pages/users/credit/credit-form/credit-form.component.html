<div class="modal fade" id="creditModal" tabindex="-1" aria-labelledby="creditModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="creditModalLabel">{{ 'Add Credit Record' }}</h5>
        <button type="button" class="btn-close" (click)="cancel()"></button>
      </div>
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="modal-body">
          <div class="row g-3 mb-3">
            <div *ngIf="!selectedUserId" class="col-md-6">
              <label class="form-label">User <span class="text-danger">*</span></label>
              <select class="form-select" formControlName="userId"
                [class.is-invalid]="form.get('userId')!.invalid && form.get('userId')!.touched">
                <option value="">-- Select User --</option>
                <option *ngFor="let u of users" [value]="u.id">{{ u.displayName }} ({{ u.loginName }})</option>
              </select>
              <div class="invalid-feedback">User is required.</div>
            </div>
            <div class="col-md">
              <label class="form-label">Channel <span class="text-danger">*</span></label>
              <select class="form-select" formControlName="channel">
                <option *ngFor="let ch of channels" [value]="ch">{{ ch }}</option>
              </select>
            </div>
            <div class="col-md">
              <label class="form-label">Type <span class="text-danger">*</span></label>
              <select class="form-select" formControlName="type">
                <option *ngFor="let t of creditTypes" [value]="t">{{ t }}</option>
              </select>
            </div>
          </div>
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Units <span class="text-danger">*</span></label>
              <input type="number" class="form-control" formControlName="credits" placeholder="0" min="1" step="1"
                [class.is-invalid]="form.get('credits')!.invalid && form.get('credits')!.touched" />
              <div class="invalid-feedback">Enter a valid number of units.</div>
            </div>
            <ng-container *ngIf="form.get('type')?.value === 'CREDIT'">
              <div class="col-md-4">
                <label class="form-label">Price / Unit (&#8377;) <span class="text-danger">*</span></label>
                <input type="number" class="form-control" formControlName="pricePerUnit" placeholder="0.00" min="0.01"
                  step="0.01"
                  [class.is-invalid]="form.get('pricePerUnit')!.invalid && form.get('pricePerUnit')!.touched" />
                <div class="invalid-feedback">Enter a valid price per unit.</div>
              </div>
              <div class="col-md-4 d-flex align-items-end">
                <div class="w-100 p-2 bg-light rounded text-center">
                  <div class="text-muted small">Total Value</div>
                  <div class="fw-bold fs-6">
                    &#8377;{{ ((form.value.credits || 0) * (form.value.pricePerUnit || 0)) | number:'1.2-2' }}
                  </div>
                </div>
              </div>
            </ng-container>
            <div class="col-12">
              <label class="form-label">Description <span class="text-danger">*</span></label>
              <textarea class="form-control" formControlName="description" rows="3" placeholder="Reason / details"
                [class.is-invalid]="form.get('description')!.invalid && form.get('description')!.touched"></textarea>
              <div class="invalid-feedback">Description is required.</div>
            </div>
            <div *ngIf="errorMessage" class="col-12">
              <div class="alert alert-danger mb-0">{{ errorMessage }}</div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
          <button type="submit" class="btn btn-brand px-4" [disabled]="saving || form.invalid">
            {{ saving ? 'Saving...' : 'Create' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
