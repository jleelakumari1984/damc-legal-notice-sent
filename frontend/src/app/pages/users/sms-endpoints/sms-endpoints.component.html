<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0"><i class="fa fa-sms me-2"></i>SMS Endpoints</h5>
    <button class="btn btn-brand btn-sm" (click)="openForm()">
      <i class="fa fa-plus me-1"></i> Add Endpoint
    </button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible mb-3">
    {{ errorMessage }}
    <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
  </div>

  <div class="card">
    <div class="card-body table-responsive">
      <table id="smsEndpointsTable" class="table table-bordered table-sm w-100"></table>
    </div>
  </div>
</div>

<!-- SMS Endpoint Modal -->
<div class="modal fade" id="smsEndpointModal" tabindex="-1" aria-labelledby="smsEndpointModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="modal-header">
          <h5 class="modal-title" id="smsEndpointModalLabel">
            {{ editEndpoint ? 'Edit' : 'Add' }} SMS Endpoint
          </h5>
          <button type="button" class="btn-close" (click)="cancel()"></button>
        </div>

        <div class="modal-body">
          <div *ngIf="formError" class="alert alert-danger alert-dismissible mb-3">
            {{ formError }}
            <button type="button" class="btn-close" (click)="formError = ''"></button>
          </div>

          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Name <span class="text-danger">*</span></label>
              <input class="form-control" formControlName="name"
                [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched">
              <div class="invalid-feedback">Required.</div>
            </div>
            <div class="col-md-8">
              <label class="form-label">Host <span class="text-danger">*</span></label>
              <input class="form-control" formControlName="host" placeholder="e.g. sms.gateway.com"
                [class.is-invalid]="form.get('host')?.invalid && form.get('host')?.touched">
              <div class="invalid-feedback">Required.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label">Port <span class="text-danger">*</span></label>
              <input class="form-control" type="number" formControlName="port"
                [class.is-invalid]="form.get('port')?.invalid && form.get('port')?.touched">
              <div class="invalid-feedback">Required (1–65535).</div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Username <span class="text-danger">*</span></label>
              <input class="form-control" formControlName="username" autocomplete="off"
                [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched">
              <div class="invalid-feedback">Required.</div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Password
                <small class="text-muted ms-1">{{ editEndpoint ? '(leave blank to keep existing)' : '*' }}</small>
              </label>
              <input class="form-control" type="password" formControlName="password" autocomplete="new-password">
              <div class="form-text"><i class="fa fa-lock me-1"></i>Password is stored securely and never displayed.</div>
            </div>
            <div class="col-12">
              <label class="form-label">API Path <span class="text-danger">*</span></label>
              <input class="form-control" formControlName="apiPath" placeholder="e.g. /api/v2/send"
                [class.is-invalid]="form.get('apiPath')?.invalid && form.get('apiPath')?.touched">
              <div class="invalid-feedback">Required.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label">Status</label>
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" formControlName="status" id="smsEndpointStatus">
                <label class="form-check-label" for="smsEndpointStatus">Active</label>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
          <button type="submit" class="btn btn-brand" [disabled]="saving || form.invalid">
            <span *ngIf="saving" class="spinner-border spinner-border-sm me-1"></span>
            {{ editEndpoint ? 'Update' : 'Save' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
