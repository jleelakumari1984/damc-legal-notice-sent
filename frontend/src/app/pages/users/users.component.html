<div class=" py-4" [class.d-none]="actionType !== 'view'">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="brand-title mb-0">User Management</h3>
    <div class="d-flex gap-2">
      <button class="btn btn-secondary btn-sm" (click)="reload()">Refresh</button>
      <button class="btn btn-outline-secondary btn-sm" (click)="userFilter.open()"><i class="fa fa-filter me-1"></i> Filter</button>
      <button class="btn btn-brand btn-sm" (click)="openAddModal()">+ Add User</button>
    </div>
  </div>

  <div *ngIf="successMessage" class="alert alert-success alert-dismissible mb-3">
    {{ successMessage }}
    <button type="button" class="btn-close" (click)="successMessage = ''"></button>
  </div>
  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible mb-3">
    {{ errorMessage }}
    <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
  </div>

  <app-user-filter #userFilter (filterChange)="onFilterChange($event)"></app-user-filter>

  <div class="card page-card p-4">
    <div class="table-responsive">
      <table id="usersTable" class="table table-striped table-sm align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Mobile</th>
            <th>Access Level</th>
            <th>Status</th>
            <th>SMS Credits</th>
            <th>WhatsApp Credits</th>
            <th>Created At</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<app-user-form [editUser]="selectedUser" (saved)="onSaved()"></app-user-form>

<app-credit *ngIf="selectedUser && actionType === 'credit'" [userId]="selectedUser.id" (close)="backButton()"
  [userName]="selectedUser.displayName"></app-credit>

<app-user-endpoints *ngIf="selectedUser && actionType === 'endpoints'" [user]="selectedUser"
  (close)="backButton()"></app-user-endpoints>


<!-- Password Update Modal -->
<div class="modal fade" id="passwordModal" tabindex="-1" aria-labelledby="passwordModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="passwordModalLabel">Update Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted mb-3" *ngIf="selectedUser">
          Setting new password for <strong>{{ selectedUser.displayName }}</strong>
        </p>
        <div *ngIf="passwordError" class="alert alert-danger">{{ passwordError }}</div>
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" class="form-control" [(ngModel)]="newPassword" placeholder="Enter new password"
            autocomplete="new-password" />
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-brand" (click)="submitPasswordUpdate()"
          [disabled]="passwordSubmitting || !newPassword.trim()">
          {{ passwordSubmitting ? 'Saving...' : 'Update Password' }}
        </button>
      </div>
    </div>
  </div>
</div>
