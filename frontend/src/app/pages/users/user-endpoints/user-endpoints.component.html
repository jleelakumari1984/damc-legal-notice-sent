<div class=" py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Editing <span class="fw-bold text-danger">{{ user?.displayName }}</span> Endpoints
        </h5>
        <button class="btn btn-secondary btn-sm" (click)="close.emit()">Close</button>
    </div>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <button class="nav-link" [class.active]="activeTab === 'sms'" (click)="activeTab = 'sms'">
                SMS Endpoints
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" [class.active]="activeTab === 'whatsapp'" (click)="activeTab = 'whatsapp'">
                WhatsApp Endpoints
            </button>
        </li>
    </ul>

    <app-sms-endpoints *ngIf="activeTab === 'sms'" [userId]="user?.id ?? null"></app-sms-endpoints>
    <app-whatsapp-endpoints *ngIf="activeTab === 'whatsapp'" [userId]="user?.id ?? null"></app-whatsapp-endpoints>
</div>
